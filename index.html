// 关卡快速查找函数
function getLevelData(lv){
    const target = fullQuestionLib.find(item=>item.level === lv);
    // 如果题库内无当前关卡，自动生成一套通用四人抬轿模板（适配填充到100关）
    if(!target){
        return generateDefaultQuestion(lv);
    }
    return target;
}

// 自动生成通用四人抬轿题型（批量填充100关专用模板）
function generateDefaultQuestion(lv){
    const wanList = ["一万","二万","三万","四万","五万","六万","七万","八万","九万"];
    const tiaoList = ["一条","二条","三条","四条","五条","六条","七条","八条","九条"];
    const tongList = ["一筒","二筒","三筒","四筒","五筒","六筒","七筒","八筒","九筒"];
    const offset = lv % 9;
    const endWan = wanList[6+offset%3];
    return {
        level:lv,
        handGroups:[
            [wanList[offset],wanList[offset+1],wanList[offset+2],wanList[offset+3],wanList[offset+4],wanList[offset+5],endWan],
            [tiaoList[1],tiaoList[2],tiaoList[4],tiaoList[4],tiaoList[4],tongList[4],tongList[5]]
        ],
        opts:[
            {label:"A",tile:endWan,colorType:"wan"},
            {label:"B",tile:tiaoList[1],colorType:"tiao"},
            {label:"C",tile:tiaoList[4],colorType:"tiao"},
            {label:"D",tile:tongList[4],colorType:"tong"}
        ],
        correctIdx:0,
        explain:"无将一上听四人抬轿标准牌型，打掉万子首尾孤张，保留条子、筒子两组两面搭。条子可进1234条，筒子可进4567筒，合计8门32张，扣除手牌4张剩余28张进张，拆搭会降低胡牌速度。"
    }
}

function getTileImgSrc(tileName, type) {
    let num = tileName.replace(/[万条筒]/g, "");
    let prefix = "";
    if(type === "wan") prefix = "wan";
    if(type === "tiao") prefix = "tiao";
    if(type === "tong") prefix = "tong";
    return `./${prefix}${num}.png`;
}


function changeToImgDiv (tileText ,type = ''){
         const img = document.createElement("div");
            let tileType = type ? type : ''
            if(tileText.includes("万")) tileType = "wan";
            if(tileText.includes("条")) tileType ="tiao";
            if(tileText.includes("筒")) tileType ="tong";
            const imgCl = tileText.replace(tileType,'')
            let num = imgCl.replace(/[万条筒]/g, "");
           // img.src = getTileImgSrc(tileText, tileType);
            img.className = "mjui-icon tile-hand "+tileType+'-'+map[num];
            img.style.objectFit = "contain";

    return img
}
// 渲染当前关卡页面
function renderPage(){
    answered = false;
    const data = getLevelData(currentLv);
    document.getElementById("curLevel").innerText = currentLv;
    // 渲染两行手牌
    const handWrap = document.getElementById("handWrap");
    handWrap.innerHTML = "";

     const itemType = document.getElementById("itemType");
     if(data.type){
        itemType.innerHTML = data.type;
    }

    data.handGroups.forEach(rowTileArr=>{
        const rowDom = document.createElement("div");
        rowDom.className = "hand-row";
        rowTileArr.forEach(tileText=>{
            const img = changeToImgDiv(tileText)
            rowDom.appendChild(img);
        })
        handWrap.appendChild(rowDom);
    })
    // 渲染ABCD选项
    const optWrap = document.getElementById("optWrap");
    optWrap.innerHTML = "";
    data.opts.forEach((opt,idx)=>{
        const itemBox = document.createElement("div");
        itemBox.className = "opt-item";
       // const tileBox = document.createElement("div");
    //    tileBox.className = "opt-tile";
     //   tileBox.classList.add(opt.colorType);
     //   tileBox.innerText = opt.tile;

        const img = changeToImgDiv(opt.tile, opt.colorType) 
       img.classList.add('opt-tile');

        img.onclick = ()=>clickAnswer(idx);
        const labelDom = document.createElement("div");
        labelDom.className = "opt-label";
        labelDom.innerText = opt.label;


        itemBox.appendChild(img);
        itemBox.appendChild(labelDom);
        optWrap.appendChild(itemBox);
    })
    // 隐藏解说面板
    document.getElementById("explainBox").style.display = "none";
    // 切换按钮禁用判断
    document.getElementById("prevBtn").disabled = currentLv <= 1;
    document.getElementById("nextBtn").disabled = currentLv >= TOTAL_LEVEL;
}

// 点击选项判分逻辑
function clickAnswer(selectIdx){
    if(answered) return;
    answered = true;
    const data = getLevelData(currentLv);
    const allOptTiles = document.querySelectorAll(".opt-tile");
    allOptTiles.forEach((dom,idx)=>{
        if(idx === data.correctIdx){
            dom.classList.add("right");
        }else if(idx === selectIdx){
            dom.classList.add("wrong");
        }
        dom.style.pointerEvents = "none";
    })
    // 展示解说文字
    const expBox = document.getElementById("explainBox");
    expBox.innerText = data.explain;
    expBox.style.display = "block";
}

// 上下关卡切换
document.getElementById("prevBtn").onclick = ()=>{
    if(currentLv > 1){
        currentLv--;
        renderPage();
    }
}
document.getElementById("nextBtn").onclick = ()=>{
    if(currentLv < TOTAL_LEVEL){
        currentLv++;
        renderPage();
    }
}

// 选关弹窗逻辑
const jumpMask = document.getElementById("jumpMask");
document.getElementById("selectBtn").onclick = ()=>{
    jumpMask.style.display = "flex";
    document.getElementById("jumpInput").value = currentLv;
}
document.getElementById("jumpCancel").onclick = ()=>{
    jumpMask.style.display = "none";
}
document.getElementById("jumpOk").onclick = ()=>{
    const inputNum = parseInt(document.getElementById("jumpInput").value);
    if(isNaN(inputNum) || inputNum <1 || inputNum > TOTAL_LEVEL){
        alert(`请输入1~${TOTAL_LEVEL}之间的数字`);
        return;
    }
    currentLv = inputNum;
    jumpMask.style.display = "none";
    renderPage();
}

// 初始化页面（默认34关，和截图匹配）
renderPage();
